app = "praxrail-xbeach"
primary_region = "jnb"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "node dist/migrate.js"

[env]
  NODE_ENV = "production"
  HOST = "0.0.0.0"
  PORT = "3000"
  API_ENABLED = "true"
  DATABASE_SSL = "false"
  OWNER_TIMEZONE = "Africa/Nairobi"
  WORKSPACE_ROOT = "/app/.praxrail/workspaces"
  REPOSITORY_ROOT = "/app/.praxrail/repositories"
  TELEGRAM_ENABLED = "false"
  GITHUB_ENABLED = "false"
  CODEX_ENABLED = "false"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health/ready"
