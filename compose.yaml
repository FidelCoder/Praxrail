services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: praxrail
      POSTGRES_PASSWORD: praxrail_migrator
      POSTGRES_USER: praxrail_migrator
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U praxrail_migrator -d praxrail']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - praxrail-postgres:/var/lib/postgresql/data

  app:
    build: .
    profiles: ['app']
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://praxrail_app:praxrail_app@postgres:5432/praxrail
    init: true
    ports:
      - '3000:3000'
    restart: unless-stopped
    volumes:
      - praxrail-workspaces:/app/.praxrail

volumes:
  praxrail-postgres:
  praxrail-workspaces:
